<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الاختبار التدريبي لهواة اللاسلكي</title>
  <style>
    :root {
      --bg: #07111f;
      --panel: rgba(255,255,255,0.08);
      --panel2: rgba(255,255,255,0.12);
      --text: #f7fbff;
      --muted: #aab7c7;
      --brand: #2dd4bf;
      --brand2: #38bdf8;
      --danger: #fb7185;
      --ok: #22c55e;
      --warn: #f59e0b;
      --border: rgba(255,255,255,0.16);
      --shadow: 0 22px 60px rgba(0,0,0,0.35);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: "Segoe UI", Tahoma, Arial, sans-serif;
      color: var(--text);
      background:
        radial-gradient(circle at top left, rgba(45,212,191,.25), transparent 32%),
        radial-gradient(circle at bottom right, rgba(56,189,248,.22), transparent 34%),
        var(--bg);
      min-height: 100vh;
    }
    .app {
      display: grid;
      grid-template-columns: 320px 1fr;
      min-height: 100vh;
    }
    aside {
      border-left: 1px solid var(--border);
      background: rgba(2, 6, 23, .72);
      backdrop-filter: blur(18px);
      padding: 22px;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
    }
    main {
      padding: 28px;
      max-width: 1100px;
      width: 100%;
      margin: 0 auto;
    }
    .title {
      font-size: 1.45rem;
      font-weight: 800;
      margin: 0 0 8px;
      line-height: 1.35;
    }
    .subtitle {
      color: var(--muted);
      margin: 0 0 18px;
      font-size: .95rem;
      line-height: 1.6;
    }
    .stats {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 16px;
    }
    .stat {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 13px;
    }
    .stat .num { font-size: 1.35rem; font-weight: 800; }
    .stat .label { color: var(--muted); font-size: .8rem; margin-top: 3px; }
    .progress-wrap {
      background: rgba(255,255,255,.08);
      height: 10px;
      border-radius: 999px;
      overflow: hidden;
      margin: 12px 0 18px;
      border: 1px solid rgba(255,255,255,.08);
    }
    .progress-bar {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--brand), var(--brand2));
      transition: width .25s ease;
    }
    .navgrid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 8px;
    }
    .qnav {
      border: 1px solid var(--border);
      background: rgba(255,255,255,.06);
      color: var(--text);
      border-radius: 12px;
      padding: 9px 0;
      cursor: pointer;
      font-weight: 700;
      transition: .18s ease;
    }
    .qnav:hover, .qnav.active {
      transform: translateY(-1px);
      background: rgba(45,212,191,.22);
      border-color: rgba(45,212,191,.65);
    }
    .qnav.answered { box-shadow: inset 0 -3px 0 var(--brand2); }
    .qnav.correct { box-shadow: inset 0 -3px 0 var(--ok); }
    .qnav.wrong { box-shadow: inset 0 -3px 0 var(--danger); }
    .card {
      background: linear-gradient(180deg, rgba(255,255,255,.12), rgba(255,255,255,.07));
      border: 1px solid var(--border);
      border-radius: 28px;
      padding: 28px;
      box-shadow: var(--shadow);
      backdrop-filter: blur(16px);
    }
    .topline {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      align-items: center;
      margin-bottom: 18px;
      flex-wrap: wrap;
    }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.08);
      border-radius: 999px;
      padding: 8px 12px;
      color: var(--muted);
      font-size: .9rem;
    }
    .question {
      font-size: 1.65rem;
      line-height: 1.75;
      margin: 10px 0 18px;
      font-weight: 800;
    }
    .media-box {
      margin: 18px 0;
      border: 1px solid var(--border);
      border-radius: 22px;
      overflow: hidden;
      background: rgba(255,255,255,.05);
    }
    .media-box img {
      display: block;
      width: 100%;
      max-height: 430px;
      object-fit: contain;
      background: white;
      padding: 10px;
    }
    .youtube {
      aspect-ratio: 16/9;
      width: 100%;
      border: 0;
      display: block;
    }
    .options {
      display: grid;
      gap: 12px;
      margin-top: 16px;
    }
    .option {
      width: 100%;
      text-align: right;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.075);
      color: var(--text);
      padding: 16px 18px;
      border-radius: 18px;
      cursor: pointer;
      font-size: 1.03rem;
      line-height: 1.6;
      transition: .16s ease;
    }
    .option:hover {
      background: rgba(255,255,255,.13);
      transform: translateY(-1px);
    }
    .option.selected {
      border-color: rgba(56,189,248,.9);
      background: rgba(56,189,248,.16);
    }
    .option.correct {
      border-color: rgba(34,197,94,.9);
      background: rgba(34,197,94,.16);
    }
    .option.wrong {
      border-color: rgba(251,113,133,.9);
      background: rgba(251,113,133,.16);
    }
    .short-input {
      width: 100%;
      padding: 16px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,.08);
      color: var(--text);
      font-size: 1.2rem;
      direction: ltr;
      text-align: left;
      outline: none;
    }
    .feedback {
      margin-top: 16px;
      padding: 14px 16px;
      border-radius: 16px;
      display: none;
      border: 1px solid var(--border);
      line-height: 1.6;
    }
    .feedback.show { display: block; }
    .feedback.ok { background: rgba(34,197,94,.14); border-color: rgba(34,197,94,.45); }
    .feedback.bad { background: rgba(251,113,133,.14); border-color: rgba(251,113,133,.45); }
    .actions {
      display: flex;
      gap: 10px;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      margin-top: 22px;
    }
    button.action {
      border: 0;
      border-radius: 16px;
      padding: 13px 18px;
      cursor: pointer;
      font-weight: 800;
      color: #04111f;
      background: linear-gradient(135deg, var(--brand), var(--brand2));
      box-shadow: 0 12px 28px rgba(45,212,191,.2);
    }
    button.secondary {
      background: rgba(255,255,255,.1);
      color: var(--text);
      border: 1px solid var(--border);
      box-shadow: none;
    }
    .result-card {
      display: none;
      margin-top: 20px;
    }
    .result-card.show { display: block; }
    .review-list {
      margin-top: 18px;
      display: grid;
      gap: 10px;
    }
    .review-item {
      border: 1px solid var(--border);
      background: rgba(255,255,255,.06);
      border-radius: 16px;
      padding: 12px 14px;
      line-height: 1.65;
    }
    .review-item strong { color: var(--brand); }
    .small { color: var(--muted); font-size: .92rem; }
    @media (max-width: 900px) {
      .app { grid-template-columns: 1fr; }
      aside { position: relative; height: auto; }
      main { padding: 18px; }
      .question { font-size: 1.25rem; }
      .navgrid { grid-template-columns: repeat(7, 1fr); }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <h1 class="title">الاختبار التدريبي لهواة اللاسلكي</h1>
      <p class="subtitle">تدريب تفاعلي مبني على ملف JSON. اختر الإجابة ثم اضغط تحقق، أو انتقل بين الأسئلة بحرية.</p>

      <div class="stats">
        <div class="stat"><div class="num" id="answeredCount">0</div><div class="label">تمت الإجابة</div></div>
        <div class="stat"><div class="num" id="scoreNow">0</div><div class="label">إجابات صحيحة</div></div>
      </div>

      <div class="progress-wrap"><div class="progress-bar" id="progressBar"></div></div>

      <div class="actions" style="margin:0 0 16px">
        <button class="action secondary" onclick="toggleAnswers()">إظهار/إخفاء الإجابات</button>
        <button class="action secondary" onclick="resetQuiz()">إعادة</button>
      </div>

      <div class="navgrid" id="navGrid"></div>
    </aside>

    <main>
      <section class="card" id="quizCard">
        <div class="topline">
          <div class="badge" id="qBadge">السؤال</div>
          <div class="badge" id="pointsBadge">النقاط</div>
        </div>
        <div class="question" id="questionText"></div>
        <div id="mediaArea"></div>
        <div id="answerArea"></div>
        <div class="feedback" id="feedback"></div>

        <div class="actions">
          <button class="action secondary" onclick="prevQuestion()">السابق</button>
          <div>
            <button class="action secondary" onclick="checkCurrent()">تحقق</button>
            <button class="action" onclick="nextQuestion()">التالي</button>
          </div>
        </div>
      </section>

      <section class="card result-card" id="resultCard">
        <h2 style="margin-top:0">النتيجة النهائية</h2>
        <p class="small" id="resultSummary"></p>
        <div class="review-list" id="reviewList"></div>
      </section>
    </main>
  </div>

7HH"], "correctAnswerText": "VK7HH"}, {"id": 66, "category": null, "points": 1, "type": "single_choice", "question": "تريد أن تحدد موقعك على الخريطة ، ما الحل المناسب لاستخدامه كهاوي لاسلكي ؟", "options": [{"id": "A", "text": "GPS نظام"}, {"id": "B", "text": "خرائط قوقل"}, {"id": "C", "text": "Locator Grid معين مواقع الشبكة"}, {"id": "D", "text": "خطوط الطول و دوائر العرض"}], "correctOptionId": "C", "media": [], "metadata": null}];

let current = 0;
let showAnswers = false;
const state = {};

function youtubeEmbed(url) {
  const id = (url.match(/[?&]v=([^&]+)/) || [])[1] || url.split('/').pop();
  return `https://www.youtube.com/embed/${id}`;
}

function normalizeText(v) {
  return String(v || "").trim().toLowerCase();
}

function getQuestionStatus(q) {
  const s = state[q.id];
  if (!s || s.answer === undefined || s.answer === "") return "unanswered";
  if (q.type === "short_answer") {
    const accepted = q.acceptedAnswers || q.options || [];
    return accepted.map(normalizeText).includes(normalizeText(s.answer)) ? "correct" : "wrong";
  }
  return s.answer === q.correctOptionId ? "correct" : "wrong";
}

function renderNav() {
  const nav = document.getElementById("navGrid");
  nav.innerHTML = "";
  QUESTIONS.forEach((q, i) => {
    const btn = document.createElement("button");
    btn.className = "qnav";
    if (i === current) btn.classList.add("active");
    const status = getQuestionStatus(q);
    if (status !== "unanswered") {
      btn.classList.add(showAnswers ? status : "answered");
    }
    btn.textContent = q.id;
    btn.onclick = () => { current = i; render(); };
    nav.appendChild(btn);
  });
}

function renderMedia(q) {
  const area = document.getElementById("mediaArea");
  area.innerHTML = "";
  (q.media || []).forEach(m => {
    const box = document.createElement("div");
    box.className = "media-box";
    if (m.type === "image") {
      const img = document.createElement("img");
      img.src = m.src;
      img.alt = "Question image";
      box.appendChild(img);
    } else if (m.type === "youtube") {
      const iframe = document.createElement("iframe");
      iframe.className = "youtube";
      iframe.src = youtubeEmbed(m.url);
      iframe.allow = "accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share";
      iframe.allowFullscreen = true;
      box.appendChild(iframe);
    }
    area.appendChild(box);
  });
}

function renderAnswers(q) {
  const area = document.getElementById("answerArea");
  area.innerHTML = "";

  if (q.type === "short_answer") {
    const input = document.createElement("input");
    input.className = "short-input";
    input.placeholder = "اكتب الإجابة هنا...";
    input.value = state[q.id]?.answer || "";
    input.oninput = e => {
      state[q.id] = { answer: e.target.value, checked: false };
      updateStats();
      renderNav();
    };
    area.appendChild(input);
    return;
  }

  const options = document.createElement("div");
  options.className = "options";

  q.options.forEach(opt => {
    const btn = document.createElement("button");
    btn.className = "option";
    btn.innerHTML = `<strong>${opt.id}.</strong> ${escapeHtml(opt.text)}`;

    const selected = state[q.id]?.answer === opt.id;
    if (selected) btn.classList.add("selected");

    if (showAnswers || state[q.id]?.checked) {
      if (opt.id === q.correctOptionId) btn.classList.add("correct");
      if (selected && opt.id !== q.correctOptionId) btn.classList.add("wrong");
    }

    btn.onclick = () => {
      state[q.id] = { answer: opt.id, checked: false };
      render();
    };
    options.appendChild(btn);
  });
  area.appendChild(options);
}

function escapeHtml(str) {
  return String(str).replace(/[&<>"']/g, s => ({
    "&":"&amp;", "<":"&lt;", ">":"&gt;", '"':"&quot;", "'":"&#039;"
  }[s]));
}

function renderFeedback(q) {
  const fb = document.getElementById("feedback");
  fb.className = "feedback";
  fb.innerHTML = "";

  const s = state[q.id];
  if (!s?.checked && !showAnswers) return;

  const status = getQuestionStatus(q);
  if (status === "correct") {
    fb.classList.add("show", "ok");
    fb.textContent = "إجابة صحيحة ✅";
  } else if (status === "wrong") {
    fb.classList.add("show", "bad");
    if (q.type === "short_answer") {
      fb.textContent = `إجابة غير صحيحة. الإجابة الصحيحة: ${q.correctAnswerText || (q.acceptedAnswers || [])[0] || ""}`;
    } else {
      const correct = q.options.find(o => o.id === q.correctOptionId);
      fb.textContent = `إجابة غير صحيحة. الإجابة الصحيحة: ${q.correctOptionId} - ${correct ? correct.text : ""}`;
    }
  }
}

function render() {
  const q = QUESTIONS[current];
  document.getElementById("qBadge").textContent = `السؤال ${q.id} من ${QUESTIONS.length}`;
  document.getElementById("pointsBadge").textContent = `${q.points} نقطة`;
  document.getElementById("questionText").textContent = q.question;

  renderMedia(q);
  renderAnswers(q);
  renderFeedback(q);
  renderNav();
  updateStats();
}

function checkCurrent() {
  const q = QUESTIONS[current];
  const s = state[q.id];
  if (!s || s.answer === undefined || s.answer === "") {
    const fb = document.getElementById("feedback");
    fb.className = "feedback show bad";
    fb.textContent = "اختر إجابة أولاً.";
    return;
  }
  state[q.id].checked = true;
  render();
}

function nextQuestion() {
  if (current < QUESTIONS.length - 1) {
    current++;
    render();
  } else {
    showResults();
  }
}

function prevQuestion() {
  if (current > 0) {
    current--;
    render();
  }
}

function updateStats() {
  const answered = QUESTIONS.filter(q => state[q.id]?.answer !== undefined && state[q.id]?.answer !== "").length;
  const correct = QUESTIONS.filter(q => getQuestionStatus(q) === "correct").length;
  document.getElementById("answeredCount").textContent = answered;
  document.getElementById("scoreNow").textContent = correct;
  document.getElementById("progressBar").style.width = `${answered / QUESTIONS.length * 100}%`;
}

function toggleAnswers() {
  showAnswers = !showAnswers;
  render();
}

function resetQuiz() {
  Object.keys(state).forEach(k => delete state[k]);
  current = 0;
  showAnswers = false;
  document.getElementById("resultCard").classList.remove("show");
  render();
}

function showResults() {
  const resultCard = document.getElementById("resultCard");
  const correct = QUESTIONS.filter(q => getQuestionStatus(q) === "correct").length;
  const answered = QUESTIONS.filter(q => state[q.id]?.answer !== undefined && state[q.id]?.answer !== "").length;
  document.getElementById("resultSummary").textContent =
    `أجبت على ${answered} من ${QUESTIONS.length} سؤال. عدد الإجابات الصحيحة: ${correct}. النسبة: ${Math.round(correct / QUESTIONS.length * 100)}%.`;

  const review = document.getElementById("reviewList");
  review.innerHTML = "";
  QUESTIONS.forEach(q => {
    const item = document.createElement("div");
    item.className = "review-item";
    const status = getQuestionStatus(q);
    let correctText = "";
    if (q.type === "short_answer") {
      correctText = q.correctAnswerText || (q.acceptedAnswers || [])[0] || "";
    } else {
      const c = q.options.find(o => o.id === q.correctOptionId);
      correctText = `${q.correctOptionId} - ${c ? c.text : ""}`;
    }
    item.innerHTML = `<strong>سؤال ${q.id}</strong> — ${status === "correct" ? "صحيح ✅" : status === "wrong" ? "خطأ ❌" : "لم تتم الإجابة"}<br><span class="small">الإجابة الصحيحة: ${escapeHtml(correctText)}</span>`;
    review.appendChild(item);
  });
  resultCard.classList.add("show");
  resultCard.scrollIntoView({behavior: "smooth"});
}

render();
</script>
